<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RevXChange</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/typography.css">
  <link rel="stylesheet" href="css/components/navbar.css">
  <link rel="stylesheet" href="css/pages/home.css">
</head>

<body>

  <section class="home-brands">
    <div class="container">

      <h2 class="section-title">Top Brands</h2>

      <!-- Tabs -->
      <div class="tabs">
        <button class="active">Top Brands</button>
        <button>Top Models</button>
        <button>Top Cities</button>
        <button>Price Ranges</button>
      </div>

      <!-- Brands Grid -->
      <div class="brands-grid">

        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/9/90/Mercedes-Logo.svg">
          <h4>Mercedes</h4>
          <span>(1,257)</span>
        </div>

        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg">
          <h4>BMW</h4>
          <span>(536)</span>
        </div>

        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Toyota_logo.png">
          <h4>Toyota</h4>
          <span>(322)</span>
        </div>

        <div class="brand-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Nissan_logo.png">
          <h4>Nissan</h4>
          <span>(515)</span>
        </div>

      </div>

    </div>
  </section>

</body>
</html>
